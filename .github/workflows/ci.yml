name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit public tree
        run: scripts/audit_public_tree.sh .

      - name: Compile Python sources
        run: python3 -m compileall -q notary_memory_kit tests

      - name: Run synthetic demo
        run: scripts/run_demo.sh
